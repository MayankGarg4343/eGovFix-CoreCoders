<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.54/build/spline-viewer.js"></script>

</head>

<body>
    <nav>
        <div class="header">
            <span class="logo">eGovFix</span>
            <ul id="navMenu">
                <li><span class="material-symbols-outlined">home</span> Home</li>
                <li><span class="material-symbols-outlined">info</span> About Us</li>
                <li><span class="material-symbols-outlined">call</span> Contact Us</li>
                <li><span class="material-symbols-outlined">login</span><a href="./form.html"
                        style="text-decoration: none;color: rgb(255, 247, 247);">Log In</a></li>
            </ul>

        </div>
    </nav>
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    <section class="main_body">
        <div class="partone">
            <div class="slogan">
                Welcome To eGovFix
            </div>

            <div class="animation"> <spline-viewer
                    url="https://prod.spline.design/pCgm7RF21qcfEzMl/scene.splinecode"></spline-viewer>
            </div>
        </div>
        <div class="upload_section">
            <h2>Upload Document</h2>
            <form>
                <input type="file" id="fileUpload" />
                <button type="submit">Upload</button>
            </form>
        </div>

        <div class="search_filter_section">
            <input type="text" placeholder="Search documents..." />
            <select>
                <option value="">Filter by Type</option>
                <option value="pdf">PDF</option>
                <option value="docx">DOCX</option>
                <option value="xlsx">XLSX</option>
            </select>
            <button>Search</button>
        </div>

        <div class="document_list_section">
            <h2>Document List</h2>
            <table>
                <thead>
                    <tr>
                        <th>Document Name</th>
                        <th>Type</th>
                        <th>Last Updated</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Report Q1</td>
                        <td>PDF</td>
                        <td>2024-12-20</td>
                        <td>
                            <button>View</button>
                            <button>Edit</button>
                            <button>Delete</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Budget Plan</td>
                        <td>XLSX</td>
                        <td>2024-12-18</td>
                        <td>
                            <button>View</button>
                            <button>Edit</button>
                            <button>Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="document_preview_section">
            <h2>Document Preview</h2>
            <div class="preview_area">
                <p>Select a document to preview its content here.</p>
            </div>
        </div>
    </section>



</body>

</html>
